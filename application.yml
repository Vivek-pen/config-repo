global:
  message: Hello! Welcome to Global Microservices Environment

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

logging:
  level:
    root: INFO
management:
  endpoints:
    web:
      exposure:
        include: health, info, refresh

  endpoint:
    health:
      show-details: always
